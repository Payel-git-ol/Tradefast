name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out pull request source anonymously
        if: github.event_name == 'pull_request'
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.event.pull_request.head.repo.full_name }}.git"
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.head.sha }}"
          git checkout --detach FETCH_HEAD
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Check out repository anonymously
        if: github.event_name != 'pull_request'
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags --depth=1 origin "${{ github.ref }}"
          git checkout --detach FETCH_HEAD
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
